<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OverlayTranslate Server</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Consider a more modern font if desired -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <header class="app-header">
            <h1><span class="glow">OverlayTranslate</span> <span class="wireframe">Server</span></h1>
            <button id="menu-toggle" class="menu-btn">☰ Models</button>
        </header>

        <main class="translation-container">
            <div class="language-controls">
                <div class="language-selector-wrapper">
                    <label for="source-language">From:</label>
                    <select id="source-language" name="source-language">
                        <option value="auto" selected>Auto Detect</option> <!-- Add Auto Detect -->
                        <!-- Other options populated by JS -->
                    </select>
                    <div id="detected-language-info" class="detected-lang"></div> <!-- Area for detected lang -->
                </div>

                <button id="switch-languages-btn" class="switch-btn" title="Switch Languages">⇄</button>

                <div class="language-selector-wrapper">
                    <label for="target-language">To:</label>
                    <select id="target-language" name="target-language">
                        <!-- Options populated by JS -->
                    </select>
                </div>
            </div>

            <div class="text-areas">
                <div class="text-area-wrapper input-wrapper">
                     <textarea id="input-text" placeholder="Enter text to translate..."></textarea>
                     <div id="input-char-count" class="char-count">0 / 5000</div> <!-- Example Limit -->
                </div>
                <div class="text-area-wrapper output-wrapper">
                    <textarea id="output-text" placeholder="Translation..." readonly></textarea>
                     <div id="translation-status" class="status-message"></div>
                     <button id="copy-output-btn" class="copy-btn" title="Copy Translation">📄</button>
                </div>
            </div>
            <!-- Removed the separate translate button - will happen live -->
        </main>

        <!-- Menu Sidebar/Modal (Keep structure, styling changes in CSS) -->
        <div id="model-menu" class="menu-sidebar">
            <button id="close-menu" class="close-btn">×</button>
            <h2>Model Management</h2>

            <div id="download-progress-container" class="progress-container" style="display: none;">
                <p id="progress-status">...</p>
                <div class="progress-bar-wrapper">
                     <div id="progress-bar" class="progress-bar"></div>
                </div>
                 <p id="progress-message" class="progress-details"></p>
            </div>

             <!-- Add Download All Button -->
             <button id="download-all-btn" class="download-all-btn">Download All Available</button>
             <hr class="sidebar-divider">

            <div class="model-section">
                <h3>Available Models</h3>
                <div id="available-models-list" class="model-list">
                    <p>Loading...</p>
                </div>
            </div>

             <hr class="sidebar-divider">

            <div class="model-section">
                <h3>Installed Models</h3>
                <div id="installed-models-list" class="model-list">
                    <p>Loading...</p>
                </div>
            </div>
        </div>
        <div id="menu-overlay" class="menu-overlay"></div>

    </div> <!-- End main-container -->

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
