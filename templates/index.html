<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OverlayTranslate Server</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <header class="app-header">
            <h1><span class="glow">OverlayTranslate</span> <span class="wireframe">Server</span></h1>
            <button id="menu-toggle" class="menu-btn" aria-label="Open model management menu">☰ Models</button>
        </header>

        <main class="translation-container">
            <div class="language-controls">
                <div class="language-selector-wrapper">
                    <label for="source-language">From:</label>
                    <select id="source-language" name="source-language">
                        <option value="auto" selected>Auto Detect</option>
                        <!-- Options populated by JS -->
                    </select>
                    <div id="detected-language-info" class="detected-lang" aria-live="polite"></div>
                </div>

                <button id="switch-languages-btn" class="switch-btn" title="Switch Languages" aria-label="Switch source and target languages">⇄</button>

                <div class="language-selector-wrapper">
                    <label for="target-language">To:</label>
                    <select id="target-language" name="target-language">
                        <!-- Options populated by JS -->
                    </select>
                </div>
            </div>

            <div class="text-areas">
                <div class="text-area-wrapper input-wrapper">
                     <textarea id="input-text" placeholder="Enter text to translate..." aria-label="Text to translate"></textarea>
                     <button id="clear-input-btn" class="clear-btn" title="Clear Input" aria-label="Clear input text">×</button>
                     <div class="textarea-footer">
                        <span id="input-char-count" class="char-count">0 / {{ max_input_chars | default(5000) }}</span>
                     </div>
                </div>
                <div class="text-area-wrapper output-wrapper">
                    <textarea id="output-text" placeholder="Translation..." readonly aria-label="Translated text" aria-live="polite"></textarea>
                    <div id="translation-loader" class="loader" style="display: none;" aria-label="Translating"></div>
                    <div class="textarea-footer">
                        <span id="translation-status" class="status-message" aria-live="polite"></span>
                        <button id="copy-output-btn" class="copy-btn" title="Copy Translation" aria-label="Copy translated text">📄</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Menu Sidebar -->
        <div id="model-menu" class="menu-sidebar">
            <button id="close-menu" class="close-btn" aria-label="Close model management menu">×</button>
            <h2>Model Management</h2>

            <div id="download-progress-container" class="progress-container" style="display: none;">
                <p id="progress-status">...</p>
                <div class="progress-bar-wrapper">
                     <div id="progress-bar" class="progress-bar"></div>
                </div>
                 <p id="progress-message" class="progress-details" aria-live="polite"></p>
            </div>

             <button id="download-all-btn" class="download-all-btn">Download All Available</button>
             <p id="download-all-status" class="download-all-queue-status"></p> <!-- Status for queueing -->
             <hr class="sidebar-divider">

            <div class="model-section">
                <h3>Available Models</h3>
                <div id="available-models-list" class="model-list">
                    <p>Loading...</p>
                </div>
            </div>

             <hr class="sidebar-divider">

            <div class="model-section">
                <h3>Installed Models</h3>
                <div id="installed-models-list" class="model-list">
                    <p>Loading...</p>
                </div>
            </div>
        </div>
        <div id="menu-overlay" class="menu-overlay"></div>

    </div> <!-- End main-container -->

    <!-- Pass backend config to JS if needed -->
    <script>
        // Make config values available to script.js
        window.APP_CONFIG = {
            MAX_INPUT_CHARS: parseInt("{{ max_input_chars | default(5000) }}", 10)
        };
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
