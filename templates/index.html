<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OverlayTranslate Server</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated SVG Background -->
    <div class="svg-background">
        <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
            <defs>
                <radialGradient id="Gradient1" cx="50%" cy="50%" fx="0.441602%" fy="50%" r=".5">
                    <animate attributeName="fx" dur="34s" values="0%;3%;0%" repeatCount="indefinite"></animate>
                    <stop offset="0%" stop-color="rgba(99, 102, 241, 0.15)"></stop>
                    <stop offset="100%" stop-color="rgba(99, 102, 241, 0)"></stop>
                </radialGradient>
                <radialGradient id="Gradient2" cx="50%" cy="50%" fx="2.68147%" fy="50%" r=".5">
                    <animate attributeName="fx" dur="23.5s" values="0%;3%;0%" repeatCount="indefinite"></animate>
                    <stop offset="0%" stop-color="rgba(168, 85, 247, 0.15)"></stop>
                    <stop offset="100%" stop-color="rgba(168, 85, 247, 0)"></stop>
                </radialGradient>
                <radialGradient id="Gradient3" cx="50%" cy="50%" fx="0.836536%" fy="50%" r=".5">
                    <animate attributeName="fx" dur="21.5s" values="0%;3%;0%" repeatCount="indefinite"></animate>
                    <stop offset="0%" stop-color="rgba(6, 182, 212, 0.15)"></stop>
                    <stop offset="100%" stop-color="rgba(6, 182, 212, 0)"></stop>
                </radialGradient>
            </defs>
            <rect x="13.744%" y="1.18473%" width="100%" height="100%" fill="url(#Gradient1)" transform="rotate(334.41 50 50)">
                <animate attributeName="x" dur="20s" values="25%;0%;25%" repeatCount="indefinite"></animate>
                <animate attributeName="y" dur="21s" values="0%;25%;0%" repeatCount="indefinite"></animate>
                <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="17s" repeatCount="indefinite"></animateTransform>
            </rect>
            <rect x="-2.17916%" y="35.4267%" width="100%" height="100%" fill="url(#Gradient2)" transform="rotate(255.072 50 50)">
                <animate attributeName="x" dur="23s" values="-25%;0%;-25%" repeatCount="indefinite"></animate>
                <animate attributeName="y" dur="24s" values="0%;50%;0%" repeatCount="indefinite"></animate>
                <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="12s" repeatCount="indefinite"></animateTransform>
            </rect>
            <rect x="9.00483%" y="14.5733%" width="100%" height="100%" fill="url(#Gradient3)" transform="rotate(139.903 50 50)">
                <animate attributeName="x" dur="25s" values="0%;25%;0%" repeatCount="indefinite"></animate>
                <animate attributeName="y" dur="12s" values="0%;25%;0%" repeatCount="indefinite"></animate>
                <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="9s" repeatCount="indefinite"></animateTransform>
            </rect>
        </svg>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="app-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                </div>
                <h1><span class="brand">OverlayTranslate</span> <span class="sub">Server</span></h1>
            </div>
            <div class="header-actions">
                <label class="theme-toggle" title="Toggle light/dark theme">
                    <input type="checkbox" id="theme-toggle" />
                    <span class="toggle-icon moon">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </span>
                    <span class="toggle-icon sun">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </span>
                    <span class="toggle-thumb"></span>
                </label>
                <button id="btn-models" class="btn-models" aria-label="Open model management">
                    <span class="btn-icon-svg">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        </svg>
                    </span>
                    <span>Models</span>
                    <span id="model-count-badge" class="badge" style="display:none">0</span>
                </button>
            </div>
        </header>

        <!-- Main -->
        <main>
            <!-- Language Selectors -->
            <div class="lang-controls">
                <div class="lang-group">
                    <label for="source-lang">Source</label>
                    <select id="source-lang"></select>
                    <div id="detected-lang" class="detected-lang" aria-live="polite"></div>
                </div>

                <button id="btn-switch" class="btn-switch" title="Switch Languages" aria-label="Switch source and target languages">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 8 16 13"></polyline>
                        <line x1="21" y1="8" x2="9" y2="8"></line>
                        <polyline points="8 21 3 16 8 11"></polyline>
                        <line x1="3" y1="16" x2="15" y2="16"></line>
                    </svg>
                </button>

                <div class="lang-group">
                    <label for="target-lang">Target</label>
                    <select id="target-lang"></select>
                </div>
            </div>

            <!-- Translation Area -->
            <div class="translation-card">
                <div class="translation-grid">
                    <!-- Input Pane -->
                    <div class="translation-pane">
                        <textarea id="input-text" placeholder="Enter text to translate..." spellcheck="true"></textarea>
                        <button id="btn-clear" class="btn-clear" title="Clear" aria-label="Clear input">
                            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                        <div class="pane-footer">
                            <span id="char-count" class="char-count">0 / {{ max_input_chars | default(5000) }}</span>
                            <div class="pane-actions"></div>
                        </div>
                    </div>

                    <!-- Output Pane -->
                    <div class="translation-pane">
                        <textarea id="output-text" placeholder="Translation..." readonly></textarea>
                        <div id="spinner" class="spinner">
                            <svg viewBox="0 0 50 50">
                                <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-dasharray="31.4 150">
                                    <animateTransform attributeName="transform" type="rotate" repeatCount="indefinite" dur="1s" values="0 25 25;360 25 25"/>
                                </circle>
                                <circle cx="25" cy="25" r="20" fill="none" stroke="var(--accent-2)" stroke-width="5" stroke-linecap="round" stroke-dasharray="90 150" stroke-dashoffset="-40">
                                    <animateTransform attributeName="transform" type="rotate" repeatCount="indefinite" dur="1.5s" values="0 25 25;360 25 25"/>
                                </circle>
                            </svg>
                        </div>
                        <div class="pane-footer">
                            <span id="status-msg" class="status-msg" aria-live="polite"></span>
                            <div class="pane-actions">
                                <button id="btn-copy" class="btn-icon" title="Copy translation" aria-label="Copy translated text">
                                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            OverlayTranslate — Powered by Argos Translate
        </footer>

        <!-- Model Management Sidebar -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2>Model Management</h2>
                <button id="btn-close-sidebar" class="btn-close" aria-label="Close">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="sidebar-body">
                <!-- Download Progress -->
                <div id="download-progress" class="download-progress">
                    <div class="progress-header">
                        <span id="progress-label" class="progress-label">Downloading...</span>
                        <span id="progress-percent" class="progress-percent">0%</span>
                    </div>
                    <div class="progress-track">
                        <div id="progress-fill" class="progress-fill" style="width:0%"></div>
                    </div>
                    <div id="progress-detail" class="progress-detail"></div>
                </div>

                <!-- Download All -->
                <button id="btn-download-all" class="btn-download-all" disabled>Download All Available</button>
                <div id="download-all-status" class="download-all-status"></div>

                <hr class="sidebar-divider">

                <!-- History -->
                <div class="sidebar-section">
                    <div class="section-header">
                        <h3>History</h3>
                        <span id="history-count" class="count">0</span>
                    </div>
                    <div id="history-list" class="model-list history-list">
                        <div class="empty-state">No translations yet</div>
                    </div>
                    <button id="btn-clear-history" class="btn-clear-history">Clear History</button>
                </div>

                <hr class="sidebar-divider">

                <!-- Available Models -->
                <div class="sidebar-section">
                    <div class="section-header">
                        <h3>Available Models</h3>
                        <span id="available-count" class="count">0</span>
                    </div>
                    <div class="model-search">
                        <span class="search-icon">
                            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </span>
                        <input type="text" id="search-available" placeholder="Search models..." />
                    </div>
                    <div id="available-models" class="model-list">
                        <div class="empty-state">Loading...</div>
                    </div>
                </div>

                <hr class="sidebar-divider">

                <!-- Installed Models -->
                <div class="sidebar-section">
                    <div class="section-header">
                        <h3>Installed Models</h3>
                        <span id="installed-count" class="count">0</span>
                    </div>
                    <div class="model-search">
                        <span class="search-icon">
                            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </span>
                        <input type="text" id="search-installed" placeholder="Search installed..." />
                    </div>
                    <div id="installed-models" class="model-list">
                        <div class="empty-state">Loading...</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Toast Container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Diff Modal -->
        <div id="diff-modal" class="diff-overlay">
            <div class="diff-content">
                <button id="close-diff" class="btn-close" style="float:right">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
                <h2>Translation Changes</h2>
                <div id="diff-view" class="diff-view"></div>
            </div>
        </div>
    </div>

    <script>
        window.APP_CONFIG = {
            MAX_INPUT_CHARS: parseInt("{{ max_input_chars | default(5000) }}", 10)
        };
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
